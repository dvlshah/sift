name: release

# Publishes to PyPI when a GitHub Release is published.
# Auth is PyPI Trusted Publishing (OIDC) — no API token is stored anywhere.
# One-time setup on PyPI: add a "pending publisher" for this project at
# https://pypi.org/manage/account/publishing with:
#   owner: dvlshah   repo: sift   workflow: release.yml   environment: pypi

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  pypi-publish:
    name: build + publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
